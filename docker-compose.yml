# docker-compose.yml — shp-mgmt-api local development stack
# Usage:
#   docker compose up -d          # start PostgreSQL in background
#   docker compose down           # stop (keeps volume)
#   docker compose down -v        # stop + destroy data volume

services:
  db:
    image: postgres:16-alpine
    container_name: shp-mgmt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shp_mgmt_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shp_mgmt_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data:
    driver: local
